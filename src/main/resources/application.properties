spring.application.name=ratolindo

# URL de conexÒo: jdbc:postgresql://[host]:[porta]/[nome_do_banco]
spring.datasource.url=jdbc:postgresql://localhost:5432/ratolindo
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuraþ§es do Hibernate/JPA (Opcional, mas recomendado)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true